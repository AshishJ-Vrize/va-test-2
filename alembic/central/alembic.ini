# Alembic configuration for the CENTRAL database.
#
# Run migrations from the project root:
#   alembic -c alembic/central/alembic.ini upgrade head
#
# Generate a new migration after changing central models:
#   alembic -c alembic/central/alembic.ini revision --autogenerate -m "description"
#
# Preview SQL without applying (offline mode):
#   alembic -c alembic/central/alembic.ini upgrade head --sql
#
# Do NOT put the real database URL in this file.
# env.py reads it from settings.CENTRAL_DB_URL at runtime.

[alembic]
# %(here)s expands to the directory containing this file (alembic/central/).
# This makes the config portable regardless of the working directory.
script_location = %(here)s

# Migration file naming: YYYYMMDD_HHMM_<revid>_<slug>.py
# Example: 20260421_1430_a1b2c3d4_add_tenant_plan_column.py
# Timestamp prefix ensures files sort chronologically in the directory listing.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# All timestamps in migration files are UTC.
timezone = UTC

# Truncate the slug (description) part of the filename at 40 characters.
truncate_slug_length = 40

# Intentionally blank. env.py loads the URL from settings.CENTRAL_DB_URL.
# Never put a real database URL here — this file is committed to version control.
sqlalchemy.url =

# Prepend "central_" to the Alembic version table name.
# Default is "alembic_version". Using a prefixed name avoids collision if the
# central schema ever shares a PostgreSQL server with another Alembic-managed DB.
version_table = alembic_version_central


# ---------------------------------------------------------------------------
# Logging — controls verbosity during migration runs.
# sqlalchemy.engine at WARN means SQL is not logged (avoids leaking credentials
# from the connection URL in CI logs). Set to INFO locally for debugging.
# ---------------------------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
