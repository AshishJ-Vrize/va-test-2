# Alembic configuration for TENANT databases.
#
# Tenant migrations are typically run via scripts/migrate_all_tenants.py,
# which iterates all tenants, fetches their DB credentials from Key Vault,
# and calls Alembic programmatically for each tenant.
#
# For single-tenant debugging (one tenant at a time), set sqlalchemy.url
# below and run:
#   alembic -c alembic/tenant/alembic.ini upgrade head
#
# Generate a new migration after changing tenant models:
#   alembic -c alembic/tenant/alembic.ini revision --autogenerate -m "description"
#   (autogenerate compares models against the DB at sqlalchemy.url)
#
# Preview SQL without connecting:
#   alembic -c alembic/tenant/alembic.ini upgrade head --sql

[alembic]
# %(here)s expands to the directory containing this file (alembic/tenant/).
script_location = %(here)s

# Same filename convention as central — chronological sort order.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

timezone = UTC
truncate_slug_length = 40

# Leave blank for production use via migrate_all_tenants.py.
# Set this manually ONLY for local single-tenant debugging — never commit a
# real URL here (passwords would be in version control).
sqlalchemy.url =

# Each tenant DB tracks its own migration state in this table.
# Using a prefixed name avoids any accidental collision with application tables.
version_table = alembic_version_tenant


# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
