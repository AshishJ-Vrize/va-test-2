name: Build and Deploy to Azure

on:
  push:
    branches:
      - main

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  IMAGE_NAME: va-backend
  CONTAINER_APP_NAME: ${{ secrets.CONTAINER_APP_NAME }}
  RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push image
        env:
          IMAGE_TAG: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"

      - name: Debug — list container apps
        run: az containerapp list --resource-group ${{ env.RESOURCE_GROUP }} --query "[].name" -o tsv

      - name: Configure ACR registry on Container App
        env:
          APP_NAME: ${{ env.CONTAINER_APP_NAME }}
          RG: ${{ env.RESOURCE_GROUP }}
          ACR_SERVER: ${{ env.ACR_NAME }}.azurecr.io
          ACR_USER: ${{ secrets.ACR_USERNAME }}
          ACR_PASS: ${{ secrets.ACR_PASSWORD }}
        run: az containerapp registry set --name "$APP_NAME" --resource-group "$RG" --server "$ACR_SERVER" --username "$ACR_USER" --password "$ACR_PASS"

      - name: Deploy to Container Apps
        env:
          IMAGE_TAG: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          APP_NAME: ${{ env.CONTAINER_APP_NAME }}
          RG: ${{ env.RESOURCE_GROUP }}
        run: az containerapp update --name "$APP_NAME" --resource-group "$RG" --image "$IMAGE_TAG"
